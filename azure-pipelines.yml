trigger:
- main

variables:
  pythonVersion: '3.11'
  vmImageName: 'ubuntu-latest'
  azureSubscription: 'PayYouGo(2)(01cfc6ee-b2aa-463b-98e6-99d09998413b)'
  webAppName: '2AppEquityPulse'

stages:

# ==========================
# BUILD STAGE
# ==========================
- stage: Build
  displayName: Build

  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: UsePythonVersion@0
      displayName: 'Use Python $(pythonVersion)'
      inputs:
        versionSpec: '$(pythonVersion)'

    # We skip pip install here because SCM_DO_BUILD_DURING_DEPLOYMENT 
    # tells Azure to build the app on its end.

    - task: ArchiveFiles@2
      displayName: 'Create deployment package'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/EquityPulse.zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/EquityPulse.zip'
        artifact: 'drop'

# ==========================
# DEPLOY STAGE
# ==========================
- stage: Deploy
  displayName: Deploy
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployWebApp
    environment: 'WebAppEquityPulse'
    pool:
      vmImage: $(vmImageName)

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureRmWebAppDeployment@5
            displayName: 'Deploy to Azure Web App'
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              WebAppName: '$(webAppName)'
              packageForLinux: '$(Pipeline.Workspace)/drop/EquityPulse.zip'
              RuntimeStack: 'PYTHON|3.11'
              DeploymentTypeLinux: 'oneDeploy'
              # Using gunicorn as process manager for production
              StartupCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'
